<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h2>Attendance Calculator</h2>

        <label for="totalClasses">Total Classes</label>
        <input type="number" id="totalClasses" min="0" placeholder="Enter Total Classes">

        <label for="naClasses">NA Classes (Minus from Total)</label>
        <input type="number" id="naClasses" min="0" placeholder="Optional">

        <label for="presentClasses">Total Present</label>
        <input type="number" id="presentClasses" min="0" placeholder="Enter Present Classes">

        <label for="requiredPercent">Required Attendance (%)</label>
        <input type="number" id="requiredPercent" min="0" max="100" step="0.01" placeholder="Enter Required Percentage">

        <button onclick="calculate()">Calculate</button>

        <label>More Classes Needed</label>
        <input type="text" id="result" disabled>
        <script src="script.js"></script>
    </div>

</body>

</html>
